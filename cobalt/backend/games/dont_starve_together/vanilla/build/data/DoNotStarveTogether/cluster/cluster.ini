[GAMEPLAY]
# The maximum number of players that may be connected to the cluster at one time.
max_players=6

# Enable PVP.
pvp=false

# The cluster’s game mode.
# This field is the equivalent of the “Game Mode” field on the “Host Game” screen.
# Valid values are survival, endless or wilderness.
game_mode=survival

# Pause the server when there are no players connected.
pause_when_empty=true

# Set to true to enable voting features.
vote_enabled=true

[NETWORK]
# Create an offline cluster.
# The server will not be listed publicly, and only players on the local network will be able to join, and any steam-related functionality will not work.
offline_cluster=false

# This is the number of times per-second that the server sends updates to clients.
# Increasing this may improve precision, but will result in more network traffic.
# It is recommended to leave this at the default value of 15.
# If you do change this option, it is recommended that you do so only for LAN games, and use a number evenly divisible into 60 (15, 20, 30).
tick_rate=15

# The number of reserved slots for whitelisted players.
# To whitelist a player, add their Klei UserId to the whitelist.txt file (Place this file in the same directory as cluster.ini).
whitelist_slots=0

# This is the password that players must enter to join your server.
# Leave this blank or omit it for no password.
cluster_password=

# The name for your server cluster.
# This is the name that will show up in server browser.
cluster_name=Cobalt Server

# Cluster description.
# This will show up in the server details area on the “Browse Games” screen.
cluster_description=Launched with Cobalt - https://github.com/ArtoriasCode/cobalt

# When set to true, the server will only accept connections from machines on the same LAN.
lan_only_cluster=false

# The cluster’s playstyle.
# This field is the equivalent of the “Server Playstyle” field on the “Host Game” screen.
# Valid values are cooperative, competitive, social, or madness.
cluster_intention=cooperative

# When this is set to false, the game will no longer automatically save at the end of each day.
# The game will still save on shutdown, and can be manually saved using c_save().
autosaver_enabled=true

[MISC]
# Maximum number of snapshots to retain.
# These snapshots are created every time a save occurs, and are available in the “Rollback” tab on the “Host Game” screen.
max_snapshots=6

# Allow lua commands to be entered in the command prompt or terminal that the server is running in.
console_enabled=true

[SHARD]
# Enable server sharding. This must be set to true for multi-level servers.
# For single-level servers, it can be omitted.
shard_enabled=false

# This is the network address the master server will listen on for other shard servers to connect to.
# Set this to 127.0.0.1 if all of your servers in your cluster are on the same machine, or 0.0.0.0 if the servers in your cluster are on different machines or containers.
# This only needs to be set for the master server, either in cluster.ini, or the master server's server.ini.
# Required: If shard_enabled = true and is_master = true.
# WARNING: Do not change this value.
#bind_ip=0.0.0.0

# This is the I.P. address that a non-master shard will use when trying to connect to the master shard.
# If all servers in a cluster are on the same machine, set this to 127.0.0.1.
# If all servers in a cluster are in different containers, set this parameter to cobalt_server_<server_id>, where <server_id> is the ID of the server with the master shard.
# Required: If shard_enabled = true and is_master = false.
#master_ip={CONTAINER_NAME}

# This is UDP port that the master server will listen on, and that a non-master shard will use when trying to connect to the master shard.
# This should be set to the same value for all shards by having a single entry in cluster.ini, or omitted completely to use the default.
# This must be different from the server_port setting on any shard that is running on the same machine as the master shard.
# WARNING: Do not change this value.
master_port=10888

# This is a password used to authenticate a slave server to the master.
# If you are running servers on different machines or containers that need to connect to each other, this value must be the same on each machine.
# For servers running on the same machine, you can just set this once in cluster.ini.
# Required: If shard_enabled = true.
cluster_key={CLUSTER_KEY}

[STEAM]
# When set to true, the server will only allow connections from players belonging to the steam group listed in the steam_group_id setting.
steam_group_only=false

# Steam group id for steam_group_only / steam_group_admins settings.
# See here for instructions on finding your steam group id: https://forums.kleientertainment.com/forums/topic/55994-server-admin-associate-your-server-with-a-steam-group/.
steam_group_id=0

# When this is set to true, admins of the steam group specified in steam_group_id will also have admin status on the server.
steam_group_admins=false