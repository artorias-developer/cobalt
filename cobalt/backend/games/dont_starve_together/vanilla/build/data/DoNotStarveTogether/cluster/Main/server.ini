[NETWORK]
# The UDP port that this server will listen for connections on.
# If you are running a multi-level cluster, this port must be different for each server on the same machine or container.
# This port must be between 10998 and 11018 inclusive in order for players on the same LAN to see it in their server listing.
# Ports below 1024 are restricted to privileged users on some operating systems.
# WARNING: Do not change this value.
server_port=10999

[SHARD]
# Sets a shard to be the master shard for a cluster.
# There must be exactly one master server per cluster.
# Set this to true in your master server’s server.ini, and false in every other server.ini.
# Required: If shard_enabled = true.
is_master=true

# This is the name of the shard that will show up in log files.
# It is ignored for the master server, which always has the name [SHDMASTER].
name=

[STEAM]
# Internal port used by steam.
# Make sure that this is different for each server you run on the same machine or container.
authentication_port=8766

# Internal port used by steam.
# Make sure that this is different for each server you run on the same machine or container.
master_server_port=27016