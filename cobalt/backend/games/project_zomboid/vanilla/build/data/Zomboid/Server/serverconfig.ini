# Game time stops when there are no players online
PauseEmpty=true

# Default starting port for player data. If UDP, this is this one of two ports used.\nMinimum=0 Maximum=65535 Default={SERVER_DEFAULT_PORT}
DefaultPort={SERVER_DEFAULT_PORT}

# Minimum=0 Maximum=65535 Default={SERVER_UDP_PORT}
UDPPort={SERVER_UDP_PORT}

# Name of the server displayed in the in-game browser and, if applicable, the Steam browser
PublicName=Cobalt Server

# Description displayed in the in-game public server browser. Typing \n will create a new line in your description
PublicDescription=Launched with Cobalt - https://github.com/ArtoriasCode/cobalt
