global:
  scrape_interval: 3s
  evaluation_interval: 3s

scrape_configs:
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    metric_relabel_configs:
      - source_labels: [container_label_cobalt_server]
        regex: "true"
        action: keep
